services:

  # ── 백엔드 (FastAPI) ───────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: ax-backend
    ports:
      - "8000:8000"
    env_file:
      - .env          # ANTHROPIC_API_KEY 등 시크릿
    environment:
      - PYTHONIOENCODING=utf-8
      - HOST=0.0.0.0
      - PORT=8000
      - DATABASE_URL=sqlite+aiosqlite:////app/data/ax_agent.db
      - CHROMA_PERSIST_DIR=/app/chroma_db
    volumes:
      - ax_sqlite:/app/data          # SQLite DB 영속
      - ax_chroma:/app/chroma_db     # ChromaDB 벡터 영속
    restart: unless-stopped
    networks:
      - ax_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s


  # ── 프론트엔드 (Next.js) ───────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        # 브라우저가 직접 호출하는 URL → 외부 노출 주소로 변경
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    container_name: ax-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ax_net


volumes:
  ax_sqlite:
    name: ax_sqlite_data
  ax_chroma:
    name: ax_chroma_data

networks:
  ax_net:
    name: ax_network
